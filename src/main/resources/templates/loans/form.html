<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Loan | Library Management</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <div class="container topbar-inner">
        <a class="brand" th:href="@{/dashboard}">Library Management</a>
        <nav class="nav">
            <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
            <a class="nav-link" th:href="@{/books}">Books</a>
            <a class="nav-link" th:href="@{/members}">Members</a>
            <a class="nav-link active" th:href="@{/loans}">Loans</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="nav-link nav-button">Logout</button>
            </form>
        </nav>
    </div>
</header>

<main class="container narrow">
    <section class="panel">
        <h1>Issue Book</h1>
        <form th:action="@{/loans}" th:object="${loanRequest}" method="post">
            <p class="field-error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>

            <label for="bookId">Book</label>
            <select id="bookId" th:field="*{bookId}">
                <option value="">Select a book</option>
                <option th:each="book : ${books}"
                        th:value="${book.id}"
                        th:text="${book.title + ' by ' + book.author + ' (Available: ' + book.availableCopies + ')'}"></option>
            </select>
            <p class="field-error" th:if="${#fields.hasErrors('bookId')}" th:errors="*{bookId}"></p>

            <label for="memberId">Member</label>
            <select id="memberId" th:field="*{memberId}">
                <option value="">Select a member</option>
                <option th:each="member : ${members}" th:value="${member.id}" th:text="${member.name + ' (' + member.email + ')'}"></option>
            </select>
            <p class="field-error" th:if="${#fields.hasErrors('memberId')}" th:errors="*{memberId}"></p>

            <label for="dueDate">Due Date</label>
            <input id="dueDate" type="date" th:field="*{dueDate}">
            <p class="field-error" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></p>

            <div class="form-actions">
                <button type="submit" class="btn">Issue</button>
                <a class="btn btn-light" th:href="@{/loans}">Cancel</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
